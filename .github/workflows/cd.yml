name: Python CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Build Docker image
      - name: Build Docker Image
        run: docker build -t calculator-app .

      # 🔹 Stop old container (ignore if not exists)
      - name: Stop old container
        run: docker stop calculator
        continue-on-error: true

      # 🔹 Remove old container (ignore if not exists)
      - name: Remove old container
        run: docker rm calculator
        continue-on-error: true

      # 🔹 Run new container
      - name: Deploy container
        run: docker run -d -p 5000:5000 --name calculator calculator-app
