apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: calculator-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: calculator.local

    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend-service
            port:
              number: 80

      - path: /api
        pathType: Prefix

        backend:
          service:
            name: devops-service
            port:
              number: 80
